<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Message Sent – DyeMera</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: #00AEEF;
      --teal: #00C9A7;
      --dark-bg: #080e14;
      --surface: #0f1923;
      --border: rgba(255,255,255,0.07);
      --text: #e8f0f7;
      --muted: #7a9bb5;
      --white: #ffffff;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--dark-bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* NAV */
    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 48px; height: 64px;
      background: rgba(8,14,20,0.85); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
    }
    .logo { display: flex; align-items: center; font-weight: 800; font-size: 1.5rem; text-decoration: none; letter-spacing: -0.5px; }
    .logo-text { background: linear-gradient(90deg, #c0267a 0%, #d44e1a 35%, #e8920a 55%, #4a9e2f 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .nav-links { display: flex; align-items: center; gap: 36px; list-style: none; }
    .nav-links a { text-decoration: none; color: var(--muted); font-size: 0.95rem; font-weight: 500; transition: color 0.2s; }
    .nav-links a:hover { color: var(--blue); }
    .btn-primary { background: var(--blue); color: var(--white); border: none; padding: 10px 22px; border-radius: 8px; font-size: 0.9rem; font-weight: 600; cursor: pointer; text-decoration: none; transition: background 0.2s; }
    .btn-primary:hover { background: #009fd6; }

    /* MAIN */
    main {
      flex: 1;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px 48px;
    }

    canvas {
      position: absolute;
      inset: 0; width: 100%; height: 100%;
    }

    /* CARD */
    .card {
      position: relative;
      z-index: 2;
      background: rgba(15, 25, 35, 0.75);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 64px 72px;
      text-align: center;
      max-width: 560px;
      width: 100%;
      backdrop-filter: blur(16px);
      box-shadow: 0 0 80px rgba(0,174,239,0.08), 0 32px 64px rgba(0,0,0,0.4);

      opacity: 0;
      transform: translateY(24px);
      animation: fadeUp 0.7s cubic-bezier(0.22,1,0.36,1) 0.2s forwards;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* CHECKMARK */
    .check-wrap {
      width: 88px; height: 88px;
      border-radius: 50%;
      background: rgba(0,201,167,0.1);
      border: 1.5px solid rgba(0,201,167,0.3);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 32px;
      box-shadow: 0 0 32px rgba(0,201,167,0.2);
      animation: pulseRing 2.5s ease-in-out 0.9s infinite;
    }

    @keyframes pulseRing {
      0%,100% { box-shadow: 0 0 32px rgba(0,201,167,0.2); }
      50%      { box-shadow: 0 0 56px rgba(0,201,167,0.4), 0 0 80px rgba(0,201,167,0.15); }
    }

    .check-wrap svg {
      stroke-dasharray: 50;
      stroke-dashoffset: 50;
      animation: drawCheck 0.5s cubic-bezier(0.65,0,0.35,1) 0.75s forwards;
    }

    @keyframes drawCheck {
      to { stroke-dashoffset: 0; }
    }

    h1 {
      font-size: 2rem;
      font-weight: 800;
      color: var(--white);
      margin-bottom: 14px;
      letter-spacing: -0.5px;
    }

    .subtitle {
      font-size: 1rem;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 40px;
    }

    /* COUNTDOWN */
    .countdown-wrap {
      margin-bottom: 36px;
    }

    .countdown-label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }

    .progress-bar {
      height: 3px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, var(--blue), var(--teal));
      border-radius: 2px;
      transform-origin: left;
      animation: drainBar 8s linear 0.9s forwards;
    }

    @keyframes drainBar {
      from { transform: scaleX(1); }
      to   { transform: scaleX(0); }
    }

    .countdown-num {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 8px;
    }

    .countdown-num span {
      color: var(--blue);
      font-weight: 700;
    }

    /* ACTIONS */
    .actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-glow {
      background: var(--blue);
      color: var(--white);
      border: none;
      padding: 12px 28px;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 0 20px rgba(0,174,239,0.3);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-glow:hover { transform: translateY(-2px); box-shadow: 0 0 36px rgba(0,174,239,0.5); }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 12px 28px;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-ghost:hover { border-color: rgba(0,174,239,0.4); color: var(--blue); }

    /* FOOTER */
    footer {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 24px 48px;
      text-align: center;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.2);
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="logo"><span class="logo-text">DyeMera</span></a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="products-dark.html">Products</a></li>
      <li><a href="about-dark.html">About</a></li>
      <li><a href="contact-dark-landing.html">Contact</a></li>
    </ul>
    <a href="contact-dark-landing.html" class="btn-primary">Request Quote</a>
  </nav>

  <main>
    <canvas id="glowCanvas"></canvas>

    <div class="card">

      <div class="check-wrap">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none" stroke="#00C9A7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="7,18 15,26 29,10"/>
        </svg>
      </div>

      <h1>Message Sent!</h1>
      <p class="subtitle">Thank you for reaching out. Our team will review your message and get back to you within 1–2 business days.</p>

      <div class="countdown-wrap">
        <div class="countdown-label">Redirecting you to the homepage</div>
        <div class="progress-bar"><div class="progress-fill"></div></div>
        <div class="countdown-num">in <span id="counter">8</span> seconds</div>
      </div>

      <div class="actions">
        <a href="index.html" class="btn-glow">Go Now</a>
        <a href="contact-dark-landing.html" class="btn-ghost">Back to Contact</a>
      </div>

    </div>
  </main>

  <footer>© 2026 DyeMera. All rights reserved.</footer>

  <script>
    // --- Countdown & redirect ---
    let secs = 8;
    const counter = document.getElementById('counter');
    const timer = setInterval(() => {
      secs--;
      counter.textContent = secs;
      if (secs <= 0) {
        clearInterval(timer);
        window.location.href = 'index.html';
      }
    }, 1000);

    // --- Canvas animation (same as site) ---
    const canvas = document.getElementById('glowCanvas'), ctx = canvas.getContext('2d');
    function resize() { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; }
    resize(); window.addEventListener('resize', resize);
    const COLORS = [{r:0,g:174,b:239},{r:0,g:201,b:167},{r:100,g:220,b:255},{r:0,g:230,b:180}];
    class Particle {
      constructor() { this.reset(); }
      reset() {
        this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height;
        this.size = Math.random() * 3 + 1; this.baseSize = this.size;
        const angle = Math.random() * Math.PI * 2, speed = Math.random() * 0.6 + 0.2;
        this.vx = Math.cos(angle) * speed; this.vy = Math.sin(angle) * speed;
        this.wanderAngle = angle; this.wanderSpeed = (Math.random() - 0.5) * 0.04;
        this.life = 0; this.maxLife = Math.random() * 400 + 250;
        this.glowRadius = Math.random() * 20 + 8;
        this.pulse = Math.random() * Math.PI * 2; this.pulseSpeed = Math.random() * 0.025 + 0.008;
        this.colorPhase = Math.random() * Math.PI * 2; this.colorSpeed = Math.random() * 0.015 + 0.005;
      }
      update() {
        this.wanderAngle += this.wanderSpeed;
        this.vx += (Math.cos(this.wanderAngle) * 0.6 - this.vx) * 0.02;
        this.vy += (Math.sin(this.wanderAngle) * 0.6 - this.vy) * 0.02;
        this.x += this.vx; this.y += this.vy;
        if (this.x < -50) this.x = canvas.width + 50; if (this.x > canvas.width + 50) this.x = -50;
        if (this.y < -50) this.y = canvas.height + 50; if (this.y > canvas.height + 50) this.y = -50;
        this.life++; this.pulse += this.pulseSpeed; this.colorPhase += this.colorSpeed;
        this.size = this.baseSize + Math.sin(this.pulse) * 0.6;
        if (this.life > this.maxLife) this.reset();
      }
      draw() {
        const progress = this.life / this.maxLife;
        const alpha = progress < 0.1 ? progress / 0.1 : progress > 0.8 ? 1 - (progress - 0.8) / 0.2 : 1;
        const t = (Math.sin(this.colorPhase) + 1) / 2;
        const r = Math.round(160 - t * 160), g = Math.round(80 + t * 150), b = Math.round(255 - t * 155);
        const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.glowRadius);
        grad.addColorStop(0,    `rgba(${r},${g},${b},${0.18 * alpha})`);
        grad.addColorStop(0.25, `rgba(${r},${g},${b},${0.04 * alpha})`);
        grad.addColorStop(0.55, `rgba(${r},${g},${b},0)`);
        ctx.beginPath(); ctx.arc(this.x, this.y, this.glowRadius, 0, Math.PI * 2);
        ctx.fillStyle = grad; ctx.fill();
        const core = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 2);
        core.addColorStop(0, `rgba(${r},${g},${b},${alpha})`);
        core.addColorStop(1, `rgba(${r},${g},${b},0)`);
        ctx.beginPath(); ctx.arc(this.x, this.y, this.size * 2, 0, Math.PI * 2);
        ctx.fillStyle = core; ctx.fill();
      }
    }
    class Blob {
      constructor() {
        this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height;
        this.r = Math.random() * 280 + 180; this.vx = (Math.random() - 0.5) * 0.3; this.vy = (Math.random() - 0.5) * 0.3;
        this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
        this.alpha = Math.random() * 0.06 + 0.03; this.pulse = Math.random() * Math.PI * 2; this.pulseSpeed = Math.random() * 0.008 + 0.003;
      }
      update() {
        this.x += this.vx; this.y += this.vy; this.pulse += this.pulseSpeed;
        if (this.x < -this.r) this.x = canvas.width + this.r; if (this.x > canvas.width + this.r) this.x = -this.r;
        if (this.y < -this.r) this.y = canvas.height + this.r; if (this.y > canvas.height + this.r) this.y = -this.r;
      }
      draw() {
        const {r: br, g: bg, b: bb} = this.color, radius = this.r + Math.sin(this.pulse) * 30;
        const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, radius);
        grad.addColorStop(0,   `rgba(${br},${bg},${bb},${this.alpha})`);
        grad.addColorStop(0.5, `rgba(${br},${bg},${bb},${this.alpha * 0.4})`);
        grad.addColorStop(1,   `rgba(${br},${bg},${bb},0)`);
        ctx.beginPath(); ctx.arc(this.x, this.y, radius, 0, Math.PI * 2);
        ctx.fillStyle = grad; ctx.fill();
      }
    }
    let mouse = {x: canvas.width / 2, y: canvas.height / 2};
    window.addEventListener('mousemove', e => {
      const rect = canvas.getBoundingClientRect();
      mouse.x = e.clientX - rect.left; mouse.y = e.clientY - rect.top;
    });
    const particles = Array.from({length: 120}, () => new Particle());
    const blobs = Array.from({length: 6}, () => new Blob());
    let frame = 0;
    ctx.fillStyle = '#080e14'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    function animate() {
      requestAnimationFrame(animate); frame++;
      ctx.fillStyle = 'rgba(8,14,20,0.18)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
      blobs.forEach(b => { b.update(); b.draw(); });
      const mg = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, 200);
      mg.addColorStop(0, 'rgba(0,174,239,0.06)'); mg.addColorStop(0.5, 'rgba(0,174,239,0.02)'); mg.addColorStop(1, 'rgba(0,174,239,0)');
      ctx.beginPath(); ctx.arc(mouse.x, mouse.y, 200, 0, Math.PI * 2); ctx.fillStyle = mg; ctx.fill();
      if (frame % 6 === 0) {
        const p = particles[Math.floor(Math.random() * particles.length)];
        if (p.life > p.maxLife * 0.8) { p.reset(); p.x = mouse.x + (Math.random() - 0.5) * 60; p.y = mouse.y + (Math.random() - 0.5) * 60; }
      }
      particles.forEach(p => { p.update(); p.draw(); });
    }
    animate();
  </script>

</body>
</html>
